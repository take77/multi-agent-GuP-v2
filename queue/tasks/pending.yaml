# Pending Tasks — 依存解除待ちタスク
# Captain が依存ありタスクをここに書き、依存先完了時にスキャン→解除→隊員に割当
#
# 使い方:
# 1. Captain がタスク分解時、依存ありタスクを pending_tasks に追加
# 2. 依存先の完了時に Captain がスキャンし、blocked_by を更新
# 3. blocked_by が空になったら target_member の task YAML に書き込み → inbox_write
#
# 各タスクの形式:
# - task_id: subtask_XXX
#   parent_cmd: cmd_XXX
#   target_member: member_name
#   blocked_by: [subtask_YYY, subtask_ZZZ]
#   task_yaml_content:
#     task_id: subtask_XXX
#     parent_cmd: cmd_XXX
#     bloom_level: L3
#     description: "タスクの説明"
#     target_path: "/path/to/output"
#     target_branch: "feature/branch-name"
#     status: assigned
#     timestamp: "ISO 8601"
#   queued_at: "ISO 8601"

pending_tasks: []
