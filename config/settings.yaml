# multi-agent-GuP-v2 設定ファイル

# 言語設定
# ja: 日本語のみ（併記なし）
# en: 英語（日本語 + 英訳併記）
# その他の言語コード（es, zh, ko, fr, de 等）も対応
language: ja

# シェル設定
# bash: bash用プロンプト（デフォルト）
# zsh: zsh用プロンプト
shell: bash

# スキル設定
skill:
  # スキル保存先（スキル名に gup- プレフィックスを付けて保存）
  save_path: "~/.claude/skills/"

  # ローカルスキル保存先（このプロジェクト専用）
  local_path: "/home/take77/Developments/Tools/multi-agent-GuP-v2/skills/"

# ログ設定
logging:
  level: info  # debug | info | warn | error
  path: "/home/take77/Developments/Tools/multi-agent-GuP-v2/logs/"

agent_teams:
  enabled: false
  environment_variable: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"

  lead:
    agent_id: anzu
    model: "claude-opus-4-8"
    effort: high
    delegate_mode: true
    session: command
    pane: 0

  monitor:
    agent_id: miho
    type: agent_sdk
    script: "scripts/monitor/start.ts"
    state_file: "queue/hq/session_state.yaml"
    hooks:
      TaskCompleted: true
      TeammateIdle: true
      Stop: true
      PostToolUse: true

  teammates:
    - agent_id: darjeeling
      model: "claude-sonnet-4-6"
      cluster_session: darjeeling
      bridge_mode: true
    - agent_id: katyusha
      model: "claude-sonnet-4-6"
      cluster_session: katyusha
      bridge_mode: true
    - agent_id: kay
      model: "claude-sonnet-4-6"
      cluster_session: kay
      bridge_mode: true
    - agent_id: maho
      model: "claude-sonnet-4-6"
      cluster_session: maho
      bridge_mode: true

  bridge:
    conversion_timeout_sec: 5
    log_dir: "logs/bridge"

  fallback:
    auto_detect: true
    unresponsive_threshold_sec: 300
    manual_command: "scripts/fallback_to_tmux.sh"

# CLI設定（エージェント別モデル / CLI種別）
# get_agent_model() が参照する。未設定時は cli_adapter.sh 内のデフォルトロジックを使用。
# エージェントごとに使用するCLIを指定
# cli_adapter.sh が参照する
cli:
  default: claude  # 未指定エージェントのデフォルト
  # 全エージェント共通の推論 effort（low | medium | high | xhigh | max）
  # Claude CLI: --effort フラグに渡される
  # Codex CLI: -c model_reasoning_effort=<value> に渡される
  # 未定義時は CLI のデフォルトを使用
  # 2026-05-28: high → xhigh に引き上げ（実装精度向上のため）
  # Opus 4.8 は全5段階対応。微妙なら max に昇格
  default_effort: xhigh
  # --- C1: 1M context（2026-06-03 反省会フォローアップ・現物確認済）---
  # Opus 4.8 は 1M トークン context window が「モデル既定」で常時有効（Claude API / サブスク認証で自動）。
  # → ここで有効化する config / フラグは不要かつ存在しない。--betas は "API key users only" ゆえ
  #   サブスク認証では使えず、そもそも不要。「未設定だから有効化」は誤解（reqの前提が誤り）。
  # 出典: platform.claude.com/docs whats-new-claude-4-8（"1M token context window by default"）。
  agents:
    anzu:
      model: "claude-opus-4-8"
    miho:
      model: "claude-opus-4-8"   # 参謀長は Opus（施策分配 + ブランチマージ判断 + 品質ゲート）
    # 副隊長（QC専任）は Claude CLI で起動し、Codex Plugin (/codex:adversarial-review)
    # を Step 3.5 で呼び出す方針（cmd_164 で整備）。ここで type:codex を指定すると
    # プラグイン経由の adversarial-review が使えなくなるので指定しない。

# Bloom Taxonomy 動的モデルルーティング
# タスク複雑度（L1-L6）に基づき、適切なモデルに振り分ける
bloom_routing:
  # Bloom Level → 推奨モデルマッピング
  levels:
    L1:  # Remember（記憶）: コピー、移動、単純置換
      model: haiku
      description: "記憶・再現タスク"
    L2:  # Understand（理解）: 整理、分類、フォーマット変換
      model: "claude-sonnet-4-6"
      description: "理解・分類タスク"
    L3:  # Apply（適用）: テンプレート適用、定型修正
      model: "claude-sonnet-4-6"
      description: "適用・定型実装タスク"
    L4:  # Analyze（分析）: 原因調査、コードレビュー、デバッグ
      model: "claude-opus-4-8"
      description: "分析・調査タスク"
    L5:  # Evaluate（評価）: 設計評価、アーキテクチャレビュー
      model: "claude-opus-4-8"
      description: "評価・比較タスク"
    L6:  # Create（創造）: 新規設計、要件定義、戦略立案
      model: "claude-opus-4-8"
      description: "創造・設計タスク"

  # Sonnet/Opus 境界
  # L1-L3: Sonnet（または Haiku）で十分
  # L4-L6: Opus が望ましい
  sonnet_max: L3
  opus_min: L4

  # モデル切替コマンド（隊長が隊員に送信）
  # bash scripts/inbox_write.sh ${member} "/model claude-opus-4-8" model_switch ${captain}
  switch_type: model_switch

codex_plugin:
  enabled: true
  auth_method: subscription
  bloom_threshold: 4
  fallback_on_limit: true
  cooldown_minutes: 60
  max_retries: 1

branch_policy:
  primary_branch: main
  allowed_long_lived:
    - main
    - develop
  short_lived_pattern: "^(feat|fix|hotfix|worktree)/"
  max_age_seconds: 604800  # 7日
  monitored_repos:
    - path: /Users/take77.mac-mini/Developments/tools/multi-agent-GuP-v2
